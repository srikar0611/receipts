name: Deploy Receipts demo to AWS

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-demo.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: receipts-demo-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Publish curated demo
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      AWS_DEMO_BUCKET: ${{ vars.AWS_DEMO_BUCKET }}
      AWS_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Require repository configuration
        shell: bash
        run: |
          set -euo pipefail
          for required in AWS_REGION AWS_ROLE_TO_ASSUME AWS_DEMO_BUCKET AWS_CLOUDFRONT_DISTRIBUTION_ID; do
            test -n "${!required}" || { echo "Missing GitHub Actions variable: $required" >&2; exit 1; }
          done

      - name: Obtain short-lived AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publish curated static demo without touching the live evidence prefix
        shell: bash
        run: |
          set -euo pipefail
          # `live/*` belongs to a separate OIDC role.  Excluding it matters even
          # with --delete: normal site updates must never erase a current feed.
          aws s3 sync docs/ "s3://$AWS_DEMO_BUCKET/" --delete --exclude "live/*" --cache-control "no-cache" --only-show-errors
          aws cloudfront create-invalidation \
            --distribution-id "$AWS_CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*" \
            --no-cli-pager
